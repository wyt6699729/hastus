# This is a Databricks asset bundle definition for hastus.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: hastus
  uuid: 15aad21e-eb36-444a-876c-13a1d9e36ab5

include:
  # This bundle intentionally deploys only hastus resources. SDP advance pipeline
  # definitions live under resources/sdp_advance/ for reference or a separate bundle.
  - resources/hastus/*.yml

# Variable declarations. Values can be overridden per target below.
variables:
  catalog:
    description: Default Unity Catalog for hastus_etl and general bundle resources
    default: hastus_dev
  schema:
    description: The schema to use
    default: default
  hastus_source:
    description: Unity Catalog volume root path for Hastus source data
    default: /Volumes/${var.catalog}/00_landing/hastus_landing

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://8259559630256218.8.gcp.databricks.com/
    variables:
      catalog: hastus_dev
      schema: default
      hastus_source: /Volumes/${var.catalog}/00_landing/hastus_landing
  prod:
    mode: production
    workspace:
      host: https://8259553918350454.4.gcp.databricks.com/
      # Deploy bundle state under the deploying service principal's workspace home
      # so CI/CD identity can always acquire deploy locks without shared-folder ACLs.
      root_path: /Workspace/Users/4023671e-0874-4730-a36a-ba1c918379ae/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: hastus_prod
      schema: default
      hastus_source: /Volumes/${var.catalog}/00_landing/hastus_landing
    permissions:
      - service_principal_name: 4023671e-0874-4730-a36a-ba1c918379ae
        level: CAN_MANAGE
