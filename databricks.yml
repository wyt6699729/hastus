# This is a Databricks asset bundle definition for hastus.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: hastus
  uuid: 15aad21e-eb36-444a-876c-13a1d9e36ab5

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: Default Unity Catalog for hastus_etl and general bundle resources
    default: hastus_dev
  sdp_catalog:
    description: Unity Catalog for sdp_advance / multi_flow Lakeflow pipelines
    default: sdp_advance
  schema:
    description: The schema to use
    default: default
  hastus_source:
    description: Unity Catalog volume root path for Hastus source data
    default: /Volumes/${var.catalog}/00_landing/hastus_landing

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://8259559630256218.8.gcp.databricks.com/
  prod:
    mode: production
    workspace:
      host: https://8259553918350454.4.gcp.databricks.com/
      # We explicitly deploy to /Workspace/Users/wangyitian91@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/wangyitian91@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: hastus
      schema: prod
    permissions:
      - user_name: wangyitian91@gmail.com
        level: CAN_MANAGE
