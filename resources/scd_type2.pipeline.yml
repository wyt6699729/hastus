# SCD Type 2 pipeline — code under src/sdp_advance/transformations/scd_type2
resources:
  pipelines:
    scd_type2:
      name: scd_type2
      catalog: ${var.sdp_catalog}
      schema: ${var.schema}
      configuration:
        source: /Volumes/${var.sdp_catalog}/sdp_cdc_1_bronze/customer_source_files
      serverless: true
      root_path: "../src/sdp_advance/transformations/scd_type2"

      libraries:
        - glob:
            include: ../src/sdp_advance/transformations/scd_type2/**

      environment:
        dependencies:
          - --editable ${workspace.file_path}
