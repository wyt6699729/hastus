# Multi-flow bronze pipeline (Lakeflow / pyspark.pipelines)
resources:
  pipelines:
    multi_flow:
      name: multi_flow
      catalog: ${var.sdp_catalog}
      schema: ${var.schema}
      configuration:
        bright_home_orders_source: /Volumes/${var.sdp_catalog}/multi_flow_1_bronze/bright_home_orders
        lumia_sports_orders_source: /Volumes/${var.sdp_catalog}/multi_flow_1_bronze/lumia_sports_orders
        northstar_outfitters_orders_source: /Volumes/${var.sdp_catalog}/multi_flow_1_bronze/northstar_outfitters_orders
      serverless: true
      root_path: "../src/sdp_advance/transformations/ingest_multiple_flows"

      libraries:
        - glob:
            include: ../src/sdp_advance/transformations/ingest_multiple_flows/**

      environment:
        dependencies:
          - --editable ${workspace.file_path}
