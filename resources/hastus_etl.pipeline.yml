# The main pipeline for hastus
resources:
  pipelines:
    hastus_etl:
      name: hastus_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      configuration:
        hastus_source: ${var.hastus_source}
      serverless: true
      root_path: "../src/hastus_etl"

      libraries:
        - glob:
            include: ../src/hastus_etl/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
